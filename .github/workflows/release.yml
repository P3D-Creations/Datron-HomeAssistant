# Automated release workflow for Datron NEXT Home Assistant integration.
#
# On every push to `main` this workflow:
#   1. Reads the current version from manifest.json
#   2. Bumps the patch number (e.g. 0.1.0 → 0.1.1)
#   3. Commits the updated manifest.json
#   4. Creates a Git tag and GitHub Release with the integration files
#
# To bump the MINOR version, include "minor" anywhere in a commit message.
# To bump the MAJOR version, include "major" anywhere in a commit message.
# To skip the release entirely, include "[skip release]" in a commit message.

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if the last commit was made by this workflow (prevents loops)
    if: "!contains(github.event.head_commit.message, '[skip release]') && !contains(github.event.head_commit.author.name, 'github-actions')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: bump
        run: |
          MESSAGE="${{ github.event.head_commit.message }}"
          if echo "$MESSAGE" | grep -qi "major"; then
            echo "part=major" >> "$GITHUB_OUTPUT"
          elif echo "$MESSAGE" | grep -qi "minor"; then
            echo "part=minor" >> "$GITHUB_OUTPUT"
          else
            echo "part=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Read current version and compute next
        id: version
        run: |
          CURRENT=$(python3 -c "
          import json
          m = json.load(open('custom_components/datron_next/manifest.json'))
          print(m['version'])
          ")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          NEXT=$(python3 -c "
          parts = '$CURRENT'.split('.')
          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])
          bump = '${{ steps.bump.outputs.part }}'
          if bump == 'major':
              major += 1; minor = 0; patch = 0
          elif bump == 'minor':
              minor += 1; patch = 0
          else:
              patch += 1
          print(f'{major}.{minor}.{patch}')
          ")
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "### Version: $CURRENT → $NEXT (${{ steps.bump.outputs.part }})" >> "$GITHUB_STEP_SUMMARY"

      - name: Update manifest.json version
        run: |
          python3 -c "
          import json, pathlib
          p = pathlib.Path('custom_components/datron_next/manifest.json')
          m = json.loads(p.read_text())
          m['version'] = '${{ steps.version.outputs.next }}'
          p.write_text(json.dumps(m, indent=2) + '\n')
          "

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/datron_next/manifest.json
          git commit -m "Bump version to ${{ steps.version.outputs.next }} [skip release]"
          git push

      - name: Create release archive
        run: |
          cd custom_components/datron_next
          zip -r ../../datron_next.zip . -x '__pycache__/*' '*.pyc'
          cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.next }}"
          name: "v${{ steps.version.outputs.next }}"
          body: |
            ## Datron NEXT v${{ steps.version.outputs.next }}

            **Version bump**: ${{ steps.bump.outputs.part }} (${{ steps.version.outputs.current }} → ${{ steps.version.outputs.next }})

            ### Commit
            ${{ github.event.head_commit.message }}
          files: datron_next.zip
          generate_release_notes: true
