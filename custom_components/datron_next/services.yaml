execute_program_async:
  name: Execute Program (Async)
  description: >
    Execute a program on the machine asynchronously. The call returns
    immediately after the program is loaded and begins running;
    monitor the machine_execution_state sensor to track progress.
    Requires the Automation API license tier.
  fields:
    path:
      name: Program Path
      description: >
        SimPL path to the program. Use the format
        ``machine:ProgramName.simpl`` for programs stored on the
        machine, or ``device:DEVICENAME\ProgramName.simpl`` for
        network devices.
      required: true
      example: "machine:MyJob.simpl"
      selector:
        text:

load_program:
  name: Load Program
  description: >
    Load a program on the machine without executing it immediately.
    After loading, the currently loaded program sensor will update.
    Use the Pause/Resume/Abort buttons or execute_program_async to
    control execution. Requires the Automation API license tier.
  fields:
    path:
      name: Program Path
      description: >
        SimPL path to the program, e.g. ``machine:MyJob.simpl``.
      required: true
      example: "machine:MyJob.simpl"
      selector:
        text:

enumerate_folder_contents:
  name: Enumerate Folder Contents
  description: >
    List the files and subfolders at a given machine path.
    Returns a response dict with ``files`` and ``subfolders`` arrays.
    Use in a script with ``response_variable`` to capture the result.
    Requires the Automation API license tier.
  fields:
    path:
      name: Folder Path
      description: >
        SimPL-format path to the folder. Use ``machine:`` for the root,
        or ``machine:folder/subfolder`` for subdirectories.
      required: true
      example: "machine:"
      selector:
        text:

get_program_file_info:
  name: Get Program File Info
  description: >
    Return metadata about a program file including its MD5 checksum,
    last modification time, expected execution duration, and whether a
    valid tool-check analysis exists.
    Returns a response dict — use with ``response_variable`` in scripts.
    Requires the Automation API license tier.
  fields:
    path:
      name: Program Path
      description: >
        SimPL path to the program, e.g. ``machine:MyJob.simpl``.
      required: true
      example: "machine:MyJob.simpl"
      selector:
        text:

activate_workpiece:
  name: Activate Workpiece
  description: >
    Activate (select) a saved workpiece setup by name. Call
    ``get_workpieces`` list from the slow coordinator attributes to see
    available names. Requires the Automation API license tier.
  fields:
    name:
      name: Workpiece Name
      description: Exact name of the workpiece to activate.
      required: true
      example: "MyWorkpiece"
      selector:
        text:

execute_remote_link:
  name: Execute Remote Link Program
  description: >
    Run a program from the machine's RemoteLink list by name.
    Requires the Automation API license tier.
  fields:
    name:
      name: RemoteLink Program Name
      description: Exact name of the RemoteLink program.
      required: true
      example: "StartupRoutine"
      selector:
        text:

set_variable:
  name: Set SimPL Variable
  description: >
    Create or overwrite a SimPL variable on the machine. The machine's
    variable database is shared with running programs, so writes are
    visible to SimPL immediately. Requires the Automation API license tier.
  fields:
    name:
      name: Variable Name
      required: true
      example: "MyFlag"
      selector:
        text:
    type:
      name: Type
      description: One of ``bool``, ``number``, or ``string``.
      required: true
      example: "bool"
      selector:
        select:
          options:
            - bool
            - number
            - string
    value:
      name: Value
      required: true
      example: true
      selector:
        text:

get_variable:
  name: Get SimPL Variable
  description: >
    Read a SimPL variable from the machine. Returns a response dict
    ``{name, type, value}`` — use with ``response_variable`` in scripts.
    Requires the Automation API license tier.
  fields:
    name:
      name: Variable Name
      required: true
      example: "MyFlag"
      selector:
        text:
    type:
      name: Type
      description: One of ``bool``, ``number``, or ``string``.
      required: true
      example: "bool"
      selector:
        select:
          options:
            - bool
            - number
            - string

confirm_dialog:
  name: Confirm Dialog
  description: >
    Confirm (or dismiss) the currently open machine dialog by clicking
    a specific button. Obtain available button labels from the
    ``open_dialog`` sensor attributes (``left_buttons`` / ``right_buttons``).
    Requires the Automation API license tier.
  fields:
    button:
      name: Button Label
      description: >
        Exact label of the button to click, as shown in the
        ``open_dialog`` sensor's ``left_buttons`` or ``right_buttons``
        attribute lists.
      required: true
      example: "OK"
      selector:
        text:
    dialog_id:
      name: Dialog ID (optional)
      description: >
        UUID of the dialog to confirm. If omitted, the currently open
        dialog detected by the sensor is used automatically.
      required: false
      example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      selector:
        text:
